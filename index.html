<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>Radio PhilAura Station</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="favicon-philaura.svg" />
<link rel="shortcut icon" href="favicon-philaura.svg" />
<link rel="apple-touch-icon" href="favicon-philaura.svg" />
<meta name="theme-color" content="#d41b66" />
<style>
:root {
--primary: #d41b66;
--accent: #e0913e;
--bg: #f5efe4;
--card: #fffaf0;
--text: #1a1a1a;
}
* { box-sizing: border-box; }
body {
margin: 0;
font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
background: var(--bg);
color: var(--text);
}
header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 16px 20px;
background: var(--card);
border-bottom: 2px solid var(--primary);
gap: 12px;
flex-wrap: wrap;
}
.brand {
display: flex;
align-items: center;
gap: 14px;
min-width: 0;
}
.brand img.logo {
width: 80px;
height: 80px;
object-fit: contain;
border-radius: 8px;
}
.titles { min-width: 0; }
.site-title {
font-size: 2rem;
font-weight: 800;
color: var(--primary);
letter-spacing: .5px;
line-height: 1.1;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.site-subtitle {
font-size: .95rem;
color: #5c5c5c;
font-style: italic;
}
nav { display: flex; gap: 18px; flex-wrap: wrap; }
nav a {
color: var(--primary);
text-decoration: none;
font-weight: 700;
}
/* Main */
.main {
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 24px;
padding: 24px;
}
.card {
background: var(--card);
border: 1px solid var(--primary);
border-radius: 12px;
padding: 16px;
width: 100%;
max-width: 380px;
text-align: center;
}
.cover-wrap {
position: relative;
width: 100%;
aspect-ratio: 1/1;
border-radius: 18px;
overflow: hidden;
background: radial-gradient(circle at top, #fff4d8, #f0ddbd 55%, #d41b66 160%);
box-shadow: inset 0 0 0 1px rgba(212,27,102,.25);
margin-bottom: 12px;
}
.album-cover {
width: 100%;
height: 100%;
display: block;
border-radius: 18px;
object-fit: cover;
}
.cover-fallback {
position: absolute;
inset: 0;
display: none;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 10px;
font-weight: 900;
color: var(--primary);
font-size: 1.05rem;
text-align: center;
padding: 20px;
}
.cover-fallback .big-icon {
font-size: 4rem;
line-height: 1;
filter: drop-shadow(0 6px 12px rgba(0,0,0,.15));
}
.cover-wrap.no-cover .album-cover { opacity: 0; }
.cover-wrap.no-cover .cover-fallback { display: flex; }
.volume-box {
margin: 14px auto 0;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
font-weight: 800;
color: var(--primary);
}
.volume-box .speaker-icon {
width: 36px;
height: 36px;
border-radius: 50%;
display: inline-flex;
align-items: center;
justify-content: center;
background: #fff;
border: 1px solid rgba(212,27,102,.35);
box-shadow: 0 4px 10px rgba(0,0,0,.08);
}
.volume-box input { width: 160px; accent-color: var(--primary); }
.onair-btn {
background: var(--accent);
color: #fff;
border: 0;
border-radius: 999px;
padding: 10px 20px;
font-weight: 800;
cursor: pointer;
}
.track-info { margin-top: 10px; font-weight: 800; color: var(--primary); }
.speaker img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; }
.equalizer { width: 48px; height: 40px; margin: 8px auto 0; display: block; }
.news img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
footer {
text-align: center;
color: #777;
padding: 24px;
border-top: 1px solid #d0c4ac;
background: var(--card);
margin-top: 8px;
font-size: .9rem;
}
/* Mobile tweaks */
@media (max-width: 768px) {
.site-title { font-size: 1.6rem; }
.brand img.logo { width: 64px; height: 64px; }
.card { max-width: 100%; }
}
</style>
</head>
<body>
<header>
<div class="brand">
<img src="logo-rfa.png" alt="Logo" class="logo" />
<div class="titles">
<div class="site-title">PhilAura FM</div>
<div class="site-subtitle">Soundtrack of Your Moments</div>
</div>
</div>
<nav>
<a href="#">🎙️ Podcast</a>
<a href="#">🗞️ News</a>
</nav>
</header>

<main class="main">
<!-- Player / Cover -->
<section class="card">
<div id="coverWrap" class="cover-wrap no-cover">
<img id="albumCover" class="album-cover" src="" alt="Copertina in onda" />
<div class="cover-fallback">
<div class="big-icon">🎧</div>
<div>Radio PhilAura Station</div>
<small>Copertina non disponibile</small>
</div>
</div>
<div id="trackInfo" class="track-info">Caricamento brano...</div>
<button id="onAirBtn" class="onair-btn">🔴 ON AIR</button>
<div class="volume-box">
<span class="speaker-icon" id="volumeIcon">🔊</span>
<input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.85" aria-label="Volume radio" />
</div>
<audio id="radioPlayer" preload="none">
<source src="https://a7.asurahosting.com:9160/radio.mp3" type="audio/mpeg" />
Il tuo browser non supporta l'audio HTML5.
</audio>
</section>

<!-- Speaker -->
<section class="card speaker">
<img src="dj-transparent.png" alt="DJ Antonio" />
<h3>ORA IN 🎧<br/>ANTONIO</h3>
<svg class="equalizer" viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
<rect x="15" width="10" height="20" fill="#e0913e">
<animate attributeName="height" values="20;60;20" dur="0.9s" repeatCount="indefinite"/>
</rect>
<rect x="35" width="10" height="60" fill="#d41b66">
<animate attributeName="height" values="60;20;60" dur="0.9s" repeatCount="indefinite"/>
</rect>
<rect x="55" width="10" height="30" fill="#e0913e">
<animate attributeName="height" values="30;70;30" dur="0.9s" repeatCount="indefinite"/>
</rect>
<rect x="75" width="10" height="40" fill="#d41b66">
<animate attributeName="height" values="40;10;40" dur="0.9s" repeatCount="indefinite"/>
</rect>
</svg>
</section>

<!-- NEWS WIDGET (solo testo, con auto-refresh) -->
<section class="card" id="news-widget" style="border-radius:10px;">
  <h3 style="margin:0;">Ultime Notizie Online</h3>
  <div id="news-updated" style="font-size:12px;color:#6b7280;margin:4px 0 12px 0;">Aggiornamento in corso…</div>
  <div id="news-list" style="display:flex; flex-direction:column; gap:12px;"></div>
</section>

<script>
  // === CONFIG ===
  const feedUrl = "https://www.ansa.it/sito/ansait_rss.xml"; // cambia qui se vuoi
  const MAX_ITEMS = 10;
  const REFRESH_MS = 5 * 60 * 1000; // ogni 5 minuti

  const container = document.getElementById("news-list");
  const updatedEl = document.getElementById("news-updated");

  let lastFirstId = null; // per evitare di ridisegnare se nulla è cambiato

  async function loadFeed(url) {
    const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url);
    const res = await fetch(api, { cache: "no-store" });
    if (!res.ok) throw new Error("Errore rete: " + res.status);
    const data = await res.json();
    if (!data || !data.items) throw new Error("Feed vuoto o non valido");
    return data.items.slice(0, MAX_ITEMS);
  }

  function stripHtml(s="") { return s.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim(); }

  function renderList(items) {
    container.innerHTML = "";
    items.forEach(item => {
      const art = document.createElement("article");
      art.style.border = "1px solid #e5e7eb";
      art.style.borderRadius = "12px";
      art.style.padding = "12px";
      art.style.background = "white";

      const title = document.createElement("a");
      title.href = item.link;
      title.target = "_blank";
      title.rel = "noopener";
      title.textContent = item.title?.trim() || "Senza titolo";
      title.style.display = "block";
      title.style.fontWeight = "700";
      title.style.textDecoration = "none";
      title.style.color = "#111827";
      title.style.marginBottom = "6px";

      const meta = document.createElement("div");
      const d = new Date(item.pubDate || item.created || Date.now());
      meta.textContent = isNaN(d.getTime()) ? "" : d.toLocaleString("it-IT");
      meta.style.fontSize = "12px";
      meta.style.color = "#6b7280";
      meta.style.marginBottom = "6px";

      const desc = document.createElement("p");
      const text = stripHtml(item.description || item.content || "");
      desc.textContent = text.length > 180 ? text.slice(0, 180) + "…" : text;
      desc.style.fontSize = "14px";
      desc.style.color = "#374151";
      desc.style.margin = 0;

      art.appendChild(title);
      art.appendChild(meta);
      art.appendChild(desc);
      container.appendChild(art);
    });
  }

  async function refresh() {
    try {
      if (!container.innerHTML) {
        container.innerHTML = "<div style='color:#6b7280'>Carico le ultime notizie…</div>";
      }
      const items = await loadFeed(feedUrl);
      const firstId = items[0]?.link || items[0]?.title || "";
      // evita ridisegno se il primo elemento è invariato
      if (firstId && firstId === lastFirstId && container.children.length > 0) {
        updatedEl.textContent = "Aggiornato alle " + new Date().toLocaleTimeString("it-IT");
        return;
      }
      lastFirstId = firstId;
      renderList(items);
      updatedEl.textContent = "Aggiornato alle " + new Date().toLocaleTimeString("it-IT");
    } catch (e) {
      console.error(e);
      updatedEl.textContent = "Errore aggiornamento.";
      container.innerHTML = "<div style='color:#b91c1c'>Impossibile caricare il feed.</div>";
    }
  }

  // primo load + auto-refresh periodico
  refresh();
  setInterval(refresh, REFRESH_MS);
</script>






<footer>© 2025 Radio PhilAura Station – Tutti i diritti riservati</footer>

<script>
// Player state
const radio = document.getElementById('radioPlayer');
const btn = document.getElementById('onAirBtn');
const info = document.getElementById('trackInfo');
const cover = document.getElementById('albumCover');
const coverWrap = document.getElementById('coverWrap');
const volumeSlider = document.getElementById('volumeSlider');
const volumeIcon = document.getElementById('volumeIcon');

// === AZURACAST CONFIG ===
// Usa lo stesso server dello stream. Se nel tuo AzuraCast lo short name è diverso,
// cambia SOLO questo valore, per esempio: "radio_philaurastation" oppure "philaurastation".
const AZURA_NOWPLAYING_URL = 'https://a7.asurahosting.com/api/nowplaying/philaurastation.it';
const FALLBACK_COVER = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#fff4d8"/>
<stop offset="0.55" stop-color="#e0913e"/>
<stop offset="1" stop-color="#d41b66"/>
</linearGradient>
</defs>
<rect width="600" height="600" rx="42" fill="url(#g)"/>
<circle cx="300" cy="270" r="135" fill="rgba(255,255,255,.28)"/>
<text x="300" y="300" text-anchor="middle" font-size="120">🎧</text>
<text x="300" y="420" text-anchor="middle" font-family="Arial" font-size="34" font-weight="800" fill="#ffffff">Radio PhilAura</text>
<text x="300" y="465" text-anchor="middle" font-family="Arial" font-size="22" fill="#fff7df">LIVE NOW</text>
</svg>`);

radio.volume = Number(volumeSlider.value);

volumeSlider.addEventListener('input', () => {
  radio.volume = Number(volumeSlider.value);
  volumeIcon.textContent = radio.volume === 0 ? '🔇' : (radio.volume < 0.45 ? '🔉' : '🔊');
});

btn.addEventListener('click', async () => {
  try {
    if (radio.paused) {
      // forza stream live e evita riprese strane da cache
      radio.load();
      await radio.play();
      btn.textContent = '🔊 LIVE NOW';
      btn.style.background = '#2e7d32';
    } else {
      radio.pause();
      btn.textContent = '🔴 ON AIR';
      btn.style.background = getComputedStyle(document.documentElement).getPropertyValue('--accent');
    }
  } catch (e) {
    console.error('Errore play radio', e);
    info.textContent = 'Clicca di nuovo: il browser ha bloccato l’audio.';
  }
});

cover.onerror = () => setFallbackCover();

function setFallbackCover() {
  coverWrap.classList.add('no-cover');
  cover.src = FALLBACK_COVER;
}

function setCover(url) {
  if (!url) return setFallbackCover();
  coverWrap.classList.remove('no-cover');
  cover.src = url + (url.includes('?') ? '&' : '?') + 't=' + Date.now();
}

// Now Playing (titolo/artista + copertina)
let lastArt = '';
async function updateNowPlaying(){
  try {
    const r = await fetch(AZURA_NOWPLAYING_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();

    const song = data?.now_playing?.song || {};
    const artist = song.artist || '';
    const title = song.title || '';
    info.textContent = (artist && title) ? `${artist} - ${title}` : (title || artist || 'Radio PhilAura Station');

    // Ordine corretto: copertina estratta dal brano, poi campo art, poi endpoint /art.
    const artUrl = song.art || data?.now_playing?.art || (AZURA_NOWPLAYING_URL + '/art');
    if (artUrl && artUrl !== lastArt) {
      setCover(artUrl);
      lastArt = artUrl;
    }
  } catch (e) {
    console.error('Errore now playing', e);
    info.textContent = 'Radio PhilAura Station';
    setFallbackCover();
  }
}

updateNowPlaying();
setInterval(updateNowPlaying, 10000);
</script>
</body>
</html>
